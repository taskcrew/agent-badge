<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      color: #1a1a2e;
      background: #fafafa;
    }
    h1 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .badge { font-size: 18px; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .status.connected { background: #ecfdf5; color: #065f46; }
    .status.disconnected { background: #fef2f2; color: #991b1b; }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .connected .dot { background: #10b981; }
    .disconnected .dot { background: #ef4444; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #6b7280;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      font-family: monospace;
      margin-bottom: 10px;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.15);
    }
    button {
      width: 100%;
      padding: 8px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #4338ca; }
    .agent-name {
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h1><span class="badge">&#x1f6e1;</span> Agent Badge</h1>

  <div id="status" class="status disconnected">
    <span class="dot"></span>
    <span id="status-text">Checking...</span>
  </div>

  <label for="apiKey">Agent API Key</label>
  <input type="text" id="apiKey" placeholder="ab_key_..." />
  <button id="saveBtn">Save Key</button>

  <script src="popup.js"></script>
</body>
</html>
