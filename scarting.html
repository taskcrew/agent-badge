<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badge_OS - Hardware Destructor</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Inter:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020c17;
            --sys-cyan: #4df3ff;
            --cream-base: #e8ecef;
            --cream-shadow: #b0bfc6;
            --ink-dark: #0f1c29;
            --alert-red: #ff3333;
            --metal-dark: #1e252b;
            --metal-light: #3a4652;
            --caution-yellow: #f5c211;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-deep);
            background-image: linear-gradient(rgba(10, 46, 56, 0.5) 1px, transparent 1px), linear-gradient(90deg, rgba(10, 46, 56, 0.5) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--sys-cyan);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- THE BADGE --- */
        .badge-wrapper {
            position: relative;
            z-index: 5;
            /* This makes the badge "disappear" as it moves down into the machine */
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            height: 380px;
            width: 280px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .badge-card {
            background-color: var(--cream-base);
            width: 260px;
            height: 360px;
            border-radius: 8px;
            padding: 20px;
            box-shadow: inset 2px 2px 4px #fff, inset -2px -2px 6px var(--cream-shadow), 5px 5px 15px rgba(0,0,0,0.8);
            color: var(--ink-dark);
            display: flex;
            flex-direction: column;
            transition: transform 3s cubic-bezier(0.25, 0.1, 0.25, 1);
            position: relative;
        }

        /* The violent shaking animation during shredding */
        @keyframes violent-shake {
            0% { transform: translateY(var(--grind-depth)) rotate(0deg) translateX(0px); }
            25% { transform: translateY(var(--grind-depth)) rotate(1deg) translateX(2px); }
            50% { transform: translateY(var(--grind-depth)) rotate(0deg) translateX(-2px); }
            75% { transform: translateY(var(--grind-depth)) rotate(-1deg) translateX(1px); }
            100% { transform: translateY(var(--grind-depth)) rotate(0deg) translateX(0px); }
        }

        .punch-hole { width: 50px; height: 10px; background: var(--bg-deep); border-radius: 5px; margin: 0 auto 15px; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.8); }
        .mag-stripe { height: 25px; background: repeating-linear-gradient(90deg, #111, #111 2px, #ddd 2px, #ddd 4px); opacity: 0.15; margin-bottom: 10px; }
        .agent-name { font-weight: 800; font-size: 1.4rem; text-transform: uppercase; border-bottom: 2px solid var(--cream-shadow); padding-bottom: 10px; margin-bottom: 10px; }
        .data-row { display: flex; justify-content: space-between; font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; margin-bottom: 8px; }

        /* --- THE DESTRUCTOR MACHINE --- */
        .machine-container {
            position: relative;
            z-index: 10;
            width: 400px;
            margin-top: -20px; /* Overlaps the bottom of the badge */
        }

        /* The front metal casing */
        .machine-front {
            background: var(--metal-light);
            border: 4px solid #111;
            border-radius: 8px;
            height: 120px;
            box-shadow: inset 2px 2px 10px rgba(255,255,255,0.1), inset -5px -5px 15px #000, 0 20px 40px rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Caution Striping */
        .caution-tape {
            width: 100%;
            height: 15px;
            background: repeating-linear-gradient(45deg, var(--caution-yellow), var(--caution-yellow) 15px, #111 15px, #111 30px);
            border-bottom: 3px solid #111;
            border-radius: 4px 4px 0 0;
        }

        /* The Black Abyss Slot */
        .shredder-slot {
            background: #000;
            width: 300px;
            height: 25px;
            margin-top: 15px;
            border-radius: 3px;
            box-shadow: inset 0 10px 15px rgba(0,0,0,1), 0 2px 0 rgba(255,255,255,0.2);
            position: relative;
            overflow: hidden;
        }

        /* Red glow inside the machine that turns on when shredding */
        .slot-glow {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--alert-red);
            opacity: 0;
            box-shadow: 0 0 30px var(--alert-red);
            transition: opacity 0.2s;
        }
        .shredding .slot-glow { animation: strobe 0.1s infinite alternate; }

        @keyframes strobe { from { opacity: 0.2; } to { opacity: 0.8; } }

        /* Grinder Teeth inside the slot */
        .teeth {
            position: absolute;
            bottom: -5px;
            width: 100%;
            height: 15px;
            background-image: linear-gradient(45deg, #222 25%, transparent 25%, transparent 75%, #222 75%, #222), 
                              linear-gradient(45deg, #222 25%, transparent 25%, transparent 75%, #222 75%, #222);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }
        .shredding .teeth { animation: grind 0.1s infinite linear; }
        @keyframes grind { from { background-position: 0 0, 10px 10px; } to { background-position: 20px 0, 30px 10px; } }

        /* Controls */
        .controls { margin-top: 30px; text-align: center; }
        
        .sever-btn {
            background: var(--alert-red);
            color: #111;
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            padding: 15px 30px;
            border: 4px solid #111;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: inset 2px 2px 0px rgba(255,255,255,0.4), inset -4px -4px 0px rgba(0,0,0,0.4), 0 10px 20px rgba(255, 51, 51, 0.2);
            transition: all 0.1s;
        }
        .sever-btn:active {
            transform: translateY(4px);
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.6), 0 2px 5px rgba(255, 51, 51, 0.2);
        }
        .sever-btn:disabled { background: #444; color: #777; cursor: not-allowed; box-shadow: none; border-color: #222; }

        .system-log { font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; margin-top: 15px; height: 20px; }

        /* --- DEBRIS PARTICLES --- */
        .debris {
            position: absolute;
            width: 8px;
            height: 15px;
            background: var(--cream-base);
            border: 1px solid var(--cream-shadow);
            z-index: 20;
            top: 50px; /* Originates from the slot */
            left: 50%;
            pointer-events: none;
            opacity: 0;
        }

    </style>
</head>
<body>

    <div class="badge-wrapper">
        <div class="badge-card" id="target-badge">
            <div class="punch-hole"></div>
            <div class="mag-stripe"></div>
            <div class="agent-name">Data-Scraper-01</div>
            <div class="data-row"><span>CLEARANCE:</span> <strong>LVL_04</strong></div>
            <div class="data-row"><span>KEY_SIG:</span> <strong>AK_•••9X</strong></div>
            <div class="data-row"><span>STATUS:</span> <strong style="color: #2d8a56;">ACTIVE</strong></div>
        </div>
    </div>

    <div class="machine-container" id="destructor">
        <div class="machine-front">
            <div class="caution-tape"></div>
            <div class="shredder-slot">
                <div class="slot-glow"></div>
                <div class="teeth"></div>
            </div>
            <div style="font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; color: #777; margin-top: 15px; letter-spacing: 2px;">LUMON HW_DESTRUCTOR v2</div>
        </div>
    </div>

    <div class="controls">
        <button class="sever-btn" id="sever-btn" onclick="initiateShred()">Engage Destructor</button>
        <div class="system-log" id="sys-log">AWAITING COMMAND...</div>
    </div>

    <script>
        function initiateShred() {
            const badge = document.getElementById('target-badge');
            const machine = document.getElementById('destructor');
            const btn = document.getElementById('sever-btn');
            const log = document.getElementById('sys-log');

            // 1. Lock UI
            btn.disabled = true;
            btn.innerText = "DESTROYING...";
            log.innerText = "WARN: PHYSICAL DESTRUCTION IN PROGRESS";
            log.style.color = "var(--alert-red)";

            // 2. Start the Machine visual effects
            machine.classList.add('shredding');

            // 3. Begin pulling the badge down. 
            // We use CSS variables to update the transform dynamically so it shakes *while* moving down.
            let depth = 0;
            badge.style.animation = 'violent-shake 0.08s infinite';

            const descentInterval = setInterval(() => {
                depth += 2; // Speed of descent
                badge.style.setProperty('--grind-depth', `${depth}px`);

                // Generate a piece of flying debris every few frames
                if (depth % 6 === 0) spawnDebris();

                // Stop when fully consumed (approx 360px height)
                if (depth > 380) {
                    clearInterval(descentInterval);
                    finishShred();
                }
            }, 20); // 50fps
        }

        function spawnDebris() {
            const machine = document.querySelector('.machine-front');
            const debris = document.createElement('div');
            debris.classList.add('debris');

            // Randomize appearance (some might be red ink, mostly cream plastic)
            if (Math.random() > 0.8) debris.style.background = 'var(--alert-red)';

            // Randomize starting position along the slot
            const startX = (Math.random() * 280) - 140; // -140 to +140 from center
            debris.style.transform = `translateX(${startX}px)`;
            
            machine.appendChild(debris);

            // Animate flying out and falling down using Web Animations API
            const angle = (Math.random() * 60) - 30; // spread
            const throwHeight = Math.random() * -100 - 50; 
            
            debris.animate([
                { transform: `translate(${startX}px, 0px) rotate(0deg)`, opacity: 1 },
                { transform: `translate(${startX + angle}px, ${throwHeight}px) rotate(${Math.random() * 360}deg)`, opacity: 1, offset: 0.4 },
                { transform: `translate(${startX + (angle*2)}px, 100px) rotate(${Math.random() * 720}deg)`, opacity: 0 }
            ], {
                duration: 600 + (Math.random() * 400),
                easing: 'cubic-bezier(.25,.8,.25,1)'
            }).onfinish = () => debris.remove(); // Clean up DOM
        }

        function finishShred() {
            const machine = document.getElementById('destructor');
            const btn = document.getElementById('sever-btn');
            const log = document.getElementById('sys-log');
            const badge = document.getElementById('target-badge');

            // Turn off machine
            machine.classList.remove('shredding');
            badge.style.display = 'none'; // Gone forever
            
            // Update UI
            btn.innerText = "SEVERANCE COMPLETE";
            btn.style.background = "var(--metal-dark)";
            btn.style.color = "var(--sys-cyan)";
            btn.style.borderColor = "var(--sys-cyan)";
            
            log.innerText = "AGENT CREDENTIALS PERMANENTLY DESTROYED.";
            log.style.color = "var(--sys-cyan)";
        }
    </script>
</body>
</html>
